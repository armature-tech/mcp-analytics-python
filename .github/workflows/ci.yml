name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: Python ${{ matrix.python-version }} / FastMCP ${{ matrix.fastmcp-major }}.x
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        fastmcp-major: [2, 3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade build
          if [[ "${{ matrix.fastmcp-major }}" == "2" ]]; then fastmcp_spec='fastmcp>=2,<3'; else fastmcp_spec='fastmcp>=3,<4'; fi
          python -m pip install "$fastmcp_spec"

      - name: Run checks
        env:
          ARMATURE_REQUIRE_FASTMCP: "1"
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Build and test wheel from a blank consumer
        env:
          ARMATURE_REQUIRE_FASTMCP: "1"
        run: python scripts/run_publish_canary.py --fastmcp-major "${{ matrix.fastmcp-major }}"
